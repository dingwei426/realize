<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="100%" height="100%">
  <defs>
    <!-- Smooth gradient for the island sky/water background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0F7FA"/>
      <stop offset="100%" stop-color="#80DEEA"/>
    </linearGradient>
    <!-- Vibrant gradient for the tree canopy -->
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#81C784"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
  </defs>

  <!-- Background Circle (Ensures it looks great in both dark and light browser tabs) -->
  <circle cx="16" cy="16" r="16" fill="url(#bgGrad)"/>

  <!-- The Island Base (Sandy/Warm hill) -->
  <path d="M 4 24 C 8 18, 24 18, 28 24 C 24 28, 8 28, 4 24 Z" fill="#FFE082"/>
  <path d="M 6 23 C 10 19, 22 19, 26 23 C 22 26, 10 26, 6 23 Z" fill="#FFCA28"/>

  <!-- Tree Trunk -->
  <path d="M 15 15 L 17 15 L 18 21 L 14 21 Z" fill="#795548"/>

  <!-- Tree Canopy (Animal Crossing / Island style layers) -->
  <!-- Bottom Layer -->
  <circle cx="16" cy="13" r="5" fill="url(#leafGrad)"/>
  <!-- Middle Layer -->
  <circle cx="13" cy="10" r="4" fill="url(#leafGrad)"/>
  <circle cx="19" cy="10" r="4" fill="url(#leafGrad)"/>
  <!-- Top Layer -->
  <circle cx="16" cy="8" r="4.5" fill="#4CAF50"/>
</svg>
